

<div class="min-h-screen bg-gray-100 p-6">

  <!-- HEADER -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800">RPG Wiki</h1>
    <p class="text-gray-500">Gerenciamento de Personagens</p>
  </div>

  <!-- FORM -->
  <div class="bg-white p-6 rounded-2xl shadow-md mb-6">
    <h2 class="text-xl font-semibold mb-4">
      {{ editando ? 'Editar Personagem' : 'Novo Personagem' }}
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div>
        <label class="block text-sm text-gray-600 mb-1">Nome</label>
        <input pInputText [(ngModel)]="novo.nome" class="w-full" />
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">Nível</label>
        <input type="number" pInputText [(ngModel)]="novo.nivel" class="w-full" />
      </div>

      <div class="flex items-end">
        <p-checkbox [(ngModel)]="novo.ativo" binary="true" label="Ativo"></p-checkbox>
      </div>

    </div>

    <div class="mt-4 flex gap-2">
      <button pButton label="Salvar" icon="pi pi-check" (click)="salvar()"></button>

      <button 
        pButton 
        label="Cancelar" 
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="resetar()">
      </button>
    </div>
  </div>

  <!-- TABELA -->
  <div class="bg-white p-6 rounded-2xl shadow-md">
    <h2 class="text-xl font-semibold mb-4">Lista de Personagens</h2>

    <p-table [value]="personagens" [paginator]="true" [rows]="5" class="p-datatable-sm">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Nível</th>
          <th>Status</th>
          <th class="text-center">Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-p>
        <tr>
          <td class="font-medium">{{ p.nome }}</td>
          <td>{{ p.nivel }}</td>
          <td>
            <span 
              class="px-2 py-1 rounded text-xs font-semibold"
              [ngClass]="p.ativo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'">
              {{ p.ativo ? 'Ativo' : 'Inativo' }}
            </span>
          </td>

          <td class="flex gap-2 justify-center">
            <button 
              pButton 
              icon="pi pi-pencil"
              class="p-button-text"
              (click)="editar(p)">
            </button>

            <button 
              pButton 
              icon="pi pi-trash"
              class="p-button-text p-button-danger"
              (click)="remover(p.id)">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
