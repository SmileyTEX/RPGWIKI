<h2>Personagens</h2>

<div style="margin-bottom: 20px;">
  <input pInputText [(ngModel)]="novo.nome" placeholder="Nome" />

  <input type="number" pInputText [(ngModel)]="novo.nivel" placeholder="Nível" />

  <p-checkbox [(ngModel)]="novo.ativo" binary="true" label="Ativo"></p-checkbox>

  <button pButton type="button" label="Salvar" (click)="salvar()"></button>
  <button pButton type="button" label="Cancelar" (click)="resetar()" class="p-button-secondary"></button>
</div>

<p-table [value]="personagens">
  <ng-template pTemplate="header">
    <tr>
      <th>Nome</th>
      <th>Nível</th>
      <th>Ativo</th>
      <th>Ações</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-p>
    <tr>
      <td>{{ p.nome }}</td>
      <td>{{ p.nivel }}</td>
      <td>{{ p.ativo ? 'Sim' : 'Não' }}</td>
      <td>
        <button pButton icon="pi pi-pencil" (click)="editar(p)"></button>
        <button pButton icon="pi pi-trash" class="p-button-danger" (click)="remover(p.id)"></button>
      </td>
    </tr>
  </ng-template>
</p-table>
